<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Tarım Sensör Simülatörü</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React ve ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel CDN (JSX kodlarını tarayıcıda çalıştırmak için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border: 2px solid currentColor;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // İkon Bileşenleri (Basit SVG halleri)
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [moisture, setMoisture] = useState(45);
            const [temperature, setTemperature] = useState(20);
            const [ec, setEc] = useState(1.2);

            const getMoistureStatus = (val) => {
                if (val < 20) return { label: 'Kritik: Çok Kuru', color: 'text-red-500', bg: 'bg-red-50', icon: 'alert-triangle' };
                if (val <= 70) return { label: 'İdeal Nem Seviyesi', color: 'text-green-600', bg: 'bg-green-50', icon: 'check-circle' };
                return { label: 'Aşırı Islak', color: 'text-blue-500', bg: 'bg-blue-50', icon: 'info' };
            };

            const getTempStatus = (val) => {
                if (val < 8) return { label: 'Çok Soğuk', color: 'text-blue-600', bg: 'bg-blue-50' };
                if (val >= 10 && val <= 18) return { label: 'Serin ama Normal', color: 'text-cyan-600', bg: 'bg-cyan-50' };
                if (val >= 8 && val <= 28) return { label: 'İyi Sıcaklık', color: 'text-green-600', bg: 'bg-green-50' };
                return { label: 'Çok Sıcak', color: 'text-orange-500', bg: 'bg-orange-50' };
            };

            const getEcStatus = (val) => {
                if (val < 0.3) return { label: 'Çok Düşük Besin', color: 'text-red-400', bg: 'bg-red-50' };
                if (val <= 0.8) return { label: 'Orta Seviye Besin', color: 'text-yellow-600', bg: 'bg-yellow-50' };
                if (val <= 2.0) return { label: 'İyi Besin Seviyesi', color: 'text-green-600', bg: 'bg-green-50' };
                return { label: 'Yüksek Tuzluluk Riski', color: 'text-purple-600', bg: 'bg-purple-50' };
            };

            const mInfo = getMoistureStatus(moisture);
            const tInfo = getTempStatus(temperature);
            const eInfo = getEcStatus(ec);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-8 text-center">
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">Akıllı Tarım Sensör Simülatörü</h1>
                            <p className="text-gray-600">Değerleri değiştirerek durumu anlık takip edin.</p>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            {/* Nem Kartı */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                                <div className="flex items-center justify-between mb-4 text-blue-600">
                                    <Icon name="droplets" className="w-6 h-6" />
                                    <span className="text-sm font-bold bg-blue-50 px-2 py-1 rounded">%{moisture}</span>
                                </div>
                                <h3 className="font-semibold text-gray-700">Toprak Nemi</h3>
                                <p className="text-xs text-gray-500 mb-4">İdeal: %20 – %70</p>
                                <input 
                                    type="range" min="0" max="100" value={moisture} 
                                    onChange={(e) => setMoisture(parseInt(e.target.value))}
                                    className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600 mb-4"
                                />
                                <div className={`flex items-center gap-2 text-sm font-bold ${mInfo.color}`}>
                                    <Icon name={mInfo.icon} className="w-4 h-4" />
                                    {mInfo.label}
                                </div>
                            </div>

                            {/* Sıcaklık Kartı */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                                <div className="flex items-center justify-between mb-4 text-orange-600">
                                    <Icon name="thermometer" className="w-6 h-6" />
                                    <span className="text-sm font-bold bg-orange-50 px-2 py-1 rounded">{temperature}°C</span>
                                </div>
                                <h3 className="font-semibold text-gray-700">Toprak Sıcaklığı</h3>
                                <p className="text-xs text-gray-500 mb-4">İyi: 8 – 28 °C</p>
                                <input 
                                    type="range" min="0" max="45" value={temperature} 
                                    onChange={(e) => setTemperature(parseInt(e.target.value))}
                                    className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-orange-500 mb-4"
                                />
                                <div className={`text-sm font-bold ${tInfo.color}`}>{tInfo.label}</div>
                            </div>

                            {/* EC Kartı */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                                <div className="flex items-center justify-between mb-4 text-green-600">
                                    <Icon name="leaf" className="w-6 h-6" />
                                    <span className="text-sm font-bold bg-green-50 px-2 py-1 rounded">{ec}</span>
                                </div>
                                <h3 className="font-semibold text-gray-700">EC (Besin)</h3>
                                <p className="text-xs text-gray-500 mb-4">İyi: 0.8 – 2.0</p>
                                <input 
                                    type="range" min="0" max="3" step="0.1" value={ec} 
                                    onChange={(e) => setEc(parseFloat(e.target.value))}
                                    className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600 mb-4"
                                />
                                <div className={`text-sm font-bold ${eInfo.color}`}>{eInfo.label}</div>
                            </div>
                        </div>

                        {/* Rapor Paneli */}
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                            <h2 className="text-lg font-bold text-gray-800 mb-4">Analiz ve Otomasyon</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div className={`p-4 rounded-xl border ${moisture < 20 ? 'bg-red-50 border-red-100' : 'bg-gray-50 border-gray-100'}`}>
                                    <p className="text-sm text-gray-700">
                                        {moisture < 20 ? "⚠️ Kritik nem! Sulama başlatıldı." : "✅ Nem seviyesi kontrol altında."}
                                    </p>
                                </div>
                                <div className={`p-4 rounded-xl border ${ec < 0.3 ? 'bg-yellow-50 border-yellow-100' : 'bg-gray-50 border-gray-100'}`}>
                                    <p className="text-sm text-gray-700">
                                        {ec < 0.3 ? "⚡ Besin düşük! Gübreleme önerilir." : "🌱 Besin dengesi yerinde."}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
